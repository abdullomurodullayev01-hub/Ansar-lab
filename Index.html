<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansar Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#0f0f13; --surface:#1a1a24; --surface2:#22222e; --border:#2e2e3e; --border2:#3a3a50;
  --text:#f0f0f4; --text2:#b0b0c0; --text3:#70708a;
  --gold:#e8b84b; --gold2:#f0c858; --gold-dim:rgba(232,184,75,0.12);
  --green:#34d399; --green-dim:rgba(52,211,153,0.12);
  --red:#f87171; --red-dim:rgba(248,113,113,0.12);
  --blue:#60a5fa; --blue-dim:rgba(96,165,250,0.12);
  --orange:#fb923c;
  --radius:14px; --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 40%,rgba(232,184,75,0.08) 0%,transparent 60%),var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo p{font-size:12px;color:var(--text3);margin-top:4px}
.role-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.role-btn{padding:10px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;font-size:11px;font-weight:600;text-align:center;transition:all 0.15s;font-family:'Inter',sans-serif}
.role-btn .rb-ico{font-size:18px;display:block;margin-bottom:4px}
.role-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px}
.login-field input{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s}
.login-field input:focus{border-color:rgba(232,184,75,0.5)}
.login-btn{width:100%;padding:13px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#0f0f13;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;margin-top:4px}
.login-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.login-err{display:none;text-align:center;color:var(--red);font-size:12px;margin-top:10px}
.login-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:16px;line-height:1.6}

/* LANG SWITCHER */
.lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.lang-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.15s;font-family:'Inter',sans-serif}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tb-menu{width:38px;height:38px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.tb-menu:hover{background:var(--surface2);color:var(--text)}
.tb-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.tb-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--gold-dim);color:var(--gold)}
.tb-date{font-size:11px;color:var(--text3);display:none}
@media(min-width:600px){.tb-date{display:block}}
.user-pill{display:flex;align-items:center;gap:7px;padding:5px 12px;background:var(--surface2);border-radius:20px;border:1px solid var(--border)}
.u-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.u-name{font-size:12px;font-weight:600;color:var(--text2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.logout-btn:hover{background:var(--red-dim);color:var(--red);border-color:transparent}

/* SIDEBAR */
.layout{display:flex;flex:1}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:230px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto;transform:translateX(-100%);transition:transform 0.25s ease;z-index:90}
.sidebar.open{transform:translateX(0)}
@media(min-width:900px){.sidebar{transform:translateX(0)}.content{margin-left:230px}}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:89;transition:opacity 0.25s}
.sb-overlay.active{opacity:1}
.sb-close{display:block;margin-bottom:12px;background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px}
@media(min-width:900px){.sb-close{display:none}}
.sb-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:14px 10px 6px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;border-radius:10px;background:transparent;border:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all 0.15s;font-family:'Inter',sans-serif;margin-bottom:2px}
.nav-btn:hover{background:var(--surface2);color:var(--text2)}
.nav-btn.active{background:var(--gold-dim);color:var(--gold)}
.nav-btn .ni{font-size:15px}
.nav-disabled{opacity:0.35;pointer-events:none}
.content{flex:1;padding:20px;max-width:960px;margin:0 auto;width:100%}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.ch h3{font-size:14px;font-weight:700;color:var(--text)}
.cb{padding:20px}
.ph{margin-bottom:20px}
.ph h2{font-size:20px;font-weight:800}
.ph p{font-size:13px;color:var(--text3);margin-top:4px}
.breadcrumb{font-size:12px;color:var(--text3);margin-bottom:12px}

/* HERO */
.hero-strip{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--surface) 0%,rgba(232,184,75,0.06) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px}
.hi{font-size:32px}
.hero-strip h3{font-size:15px;font-weight:700;color:var(--text)}
.hero-strip p{font-size:12px;color:var(--text3);margin-top:2px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.stat.gold{border-color:rgba(232,184,75,0.25)}
.stat.green{border-color:rgba(52,211,153,0.25)}
.stat.blue{border-color:rgba(96,165,250,0.25)}
.stat.red{border-color:rgba(248,113,113,0.25)}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.stat-val{font-size:26px;font-weight:800;color:var(--text);margin:4px 0 2px}
.stat-sub{font-size:11px;color:var(--text3)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge.good{background:var(--green-dim);color:var(--green)}
.badge.bad{background:var(--red-dim);color:var(--red)}
.badge.warn{background:rgba(251,146,60,0.12);color:var(--orange)}
.badge.info{background:var(--blue-dim);color:var(--blue)}
.badge.gold{background:var(--gold-dim);color:var(--gold)}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:600px){.fgrid{grid-template-columns:1fr}.fgrid3{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--text3)}
.field input,.field select,.field textarea{padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:all 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(232,184,75,0.5)}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--surface2)}
.field .hint{font-size:11px;color:var(--text3)}
.field .norm{font-size:10px;color:var(--blue);font-weight:500}
.span2{grid-column:span 2}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 20px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}

/* TABLE */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 12px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,0.02)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:'Inter',sans-serif}
.btn-gold{background:var(--gold);color:#0f0f13}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red)}

/* AI PANEL */
.ai-box{background:linear-gradient(135deg,#0d1b2a 0%,#0f1f38 100%);border:1px solid rgba(96,165,250,0.15);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.ai-box::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(232,184,75,0.1) 0%,transparent 70%);border-radius:50%}
.ai-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;animation:pulse-g 2s infinite}
@keyframes pulse-g{0%,100%{opacity:1}50%{opacity:0.3}}
.ai-head h3{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85)}
.ai-body{font-size:13px;line-height:1.75;color:rgba(255,255,255,0.6)}
.ai-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.verdict-ok{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;background:var(--green-dim);color:var(--green);margin-top:10px}
.verdict-ng{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;background:var(--red-dim);color:var(--red);margin-top:10px}

/* FILE UPLOAD */
.upload-zone{display:block;border:2px dashed var(--border2);border-radius:var(--radius-sm);background:var(--surface2);padding:24px 18px;text-align:center;cursor:pointer;transition:all 0.18s}
.upload-zone:hover{border-color:rgba(232,184,75,0.45);background:rgba(232,184,75,0.05)}
.upload-zone.dragover{border-color:var(--gold);background:var(--gold-dim)}
.upload-zone .uz-icon{font-size:26px;margin-bottom:8px}
.upload-zone .uz-text{font-size:13px;color:var(--text2);font-weight:600}
.upload-zone .uz-sub{font-size:11px;color:var(--text3);margin-top:4px}
.file-chip{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid rgba(232,184,75,0.3);border-radius:var(--radius-sm);padding:12px 14px}
.file-chip .fc-icon{width:38px;height:38px;border-radius:9px;flex-shrink:0;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:17px}
.file-chip .fc-info{flex:1;min-width:0}
.file-chip .fc-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .fc-size{font-size:11px;color:var(--text3);margin-top:1px}
.file-chip .fc-actions{display:flex;gap:6px;flex-shrink:0}
.fc-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:'Inter',sans-serif}
.fc-btn:hover{background:var(--surface);color:var(--text)}
.fc-btn.danger:hover{background:var(--red-dim);color:var(--red);border-color:transparent}

/* PDF MODAL */
.pdf-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;padding:20px}
.pdf-modal.open{display:flex}
.pdf-modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:900px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.pdf-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.pdf-modal-head h3{font-size:14px;font-weight:700;color:var(--text)}
.pdf-close-btn{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.pdf-close-btn:hover{background:var(--red-dim);color:var(--red)}
.pdf-modal-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.pdf-modal-body iframe{flex:1;border:none;width:100%;height:100%;min-height:500px}
.pdf-fallback{padding:24px;text-align:center}
.pdf-fallback p{color:var(--text2);font-size:13px;margin-bottom:16px}
.pdf-fallback a{padding:10px 20px;background:var(--gold);color:#0f0f13;border-radius:var(--radius-sm);text-decoration:none;font-weight:700;font-size:13px}

/* MICRO-INTERACTIONS */
.stat,.gdoc,.gi{transition:transform 0.18s ease,box-shadow 0.18s ease}
.stat:hover,.gdoc:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.35)}
.gi:hover{transform:translateY(-2px)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(232,184,75,0.28)}
.btn:active{transform:scale(0.97)}
.nav-btn:hover{transform:translateX(2px)}
.role-btn:not(.active):hover{border-color:var(--border2);color:var(--text2)}

/* GOST GRID */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.gi{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.gi.ok{border-color:rgba(52,211,153,0.25);background:rgba(52,211,153,0.04)}
.gi.ng{border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.04)}
.gi-norm{font-size:10px;color:var(--text3);font-weight:500}
.gi-val{font-size:18px;font-weight:800;color:var(--text);margin:2px 0}
.gi-lbl{font-size:11px;color:var(--text3)}
.gi-st{font-size:11px;font-weight:600;margin-top:4px}
.gi.ok .gi-st{color:var(--green)}
.gi.ng .gi-st{color:var(--red)}
.gi.na .gi-st{color:var(--text3)}

/* REPORT ROW */
.rrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.rrow:last-child{border:none}
.ricon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ricon.oliy{background:rgba(232,184,75,0.12)}
.ricon.nav1{background:rgba(52,211,153,0.1)}
.rinfo{flex:1;min-width:0}
.rinfo .rt{font-size:13px;font-weight:600;color:var(--text)}
.rinfo .rm{font-size:11px;color:var(--text3);margin-top:1px}

/* MINI BARS */
.bars{display:flex;flex-direction:column;gap:10px}
.brow{display:flex;align-items:center;gap:10px}
.blbl{font-size:11px;color:var(--text3);width:100px;flex-shrink:0}
.btrack{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width 0.8s ease}
.bval{font-size:11px;font-weight:600;color:var(--text2);width:36px;text-align:right}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:18px 0}

/* GDOC */
.gdoc{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.gdoc-code{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:4px}
.gdoc-name{font-size:13px;font-weight:700;color:var(--text)}
.gdoc-desc{font-size:11px;color:var(--text3);margin-top:4px}

/* NOTIFICATION */
.notif-bar{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.notif{display:flex;align-items:center;gap:9px;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideIn 0.25s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- PDF MODAL -->
<div class="pdf-modal" id="pdf-modal">
  <div class="pdf-modal-box">
    <div class="pdf-modal-head">
      <h3 id="pdf-modal-title">📄 PDF Ko'rish</h3>
      <button class="pdf-close-btn" onclick="closePdfModal()">✕</button>
    </div>
    <div class="pdf-modal-body" id="pdf-modal-body"></div>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif-bar" id="notif-bar"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="lang-bar">
      <button class="lang-btn active" onclick="setLang('uz',this)">🇺🇿 O'zbek</button>
      <button class="lang-btn" onclick="setLang('tr',this)">🇹🇷 Türkçe</button>
      <button class="lang-btn" onclick="setLang('ru',this)">🇷🇺 Русский</button>

  lang = l; T = LANGS[l];

  if (btn) btn.classList.add('active');

  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.getAttribute('data-t');
    if (T[k]) el.textContent = T[k];
  });
  // Re-sync lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    const txt = b.textContent.trim();
    if ((l==='uz'&&(txt==='🇺🇿 O\'zbek'||txt==='UZ'))||

        (l==='ru'&&(txt==='🇷🇺 Русский'||txt==='RU'))) b.classList.add('active');
  });
  if (currentPage) go(currentPage);
}

function chkVal(key,val,grade){
  const n=GOST[grade][key];if(!n)return 'na';
  const v=parseFloat(val);if(isNaN(v))return 'na';
  let ok=true;
  if(n.min!==null&&v<n.min)ok=false;
  if(n.max!==null&&v>n.max)ok=false;
  return ok?'ok':'ng';
}

function miniBar(label,val,min,max,unit,inv=false){
  const v=parseFloat(val)||0;
  const pct=Math.min(100,Math.max(0,(v-min)/(max-min)*100));
  const col=inv?(v>14.5?'var(--red)':'var(--green)'):(v>=min?'var(--green)':'var(--orange)');
  return `<div class="brow"><span class="blbl">${label}</span><div class="btrack"><div class="bfill" style="width:${pct}%;background:${col}"></div></div><span class="bval">${val||'—'}${unit}</span></div>`;
}

function renderEkinoZone(){
  if(pendingEkinoFile){
    return `<div class="file-chip">
      <div class="fc-icon">📄</div>
      <div class="fc-info">
        <div class="fc-name">${pendingEkinoFile.name}</div>
        <div class="fc-size">${formatBytes(pendingEkinoFile.size)} · Ekinograf E-6</div>
      </div>
      <div class="fc-actions">
        <button class="fc-btn" title="${t('pdfView')}" onclick="viewPendingEkino()">👁</button>
        <button class="fc-btn danger" onclick="removeEkinoFile()">✕</button>
      </div>
    </div>`;
  }
  return `<label class="upload-zone" for="f-ekino" id="ekino-dropzone" ondragover="ekDragOver(event)" ondragleave="ekDragLeave(event)" ondrop="ekDrop(event)">
    <div class="uz-icon">📤</div>
    <div class="uz-text">${t('uploadText')}</div>
    <div class="uz-sub">${t('uploadSub')}</div>
  </label>`;
}
function formatBytes(bytes){
  if(!bytes)return '0 B';
  const units=['B','KB','MB','GB'];let i=0,v=bytes;
  while(v>=1024&&i<units.length-1){v/=1024;i++;}
  return `${v.toFixed(v<10&&i>0?1:0)} ${units[i]}`;
}
function processEkinoFile(file){
  if(!file)return;
  const isPdf=file.type==='application/pdf'||/\.pdf$/i.test(file.name);
  if(!isPdf){notify('❌ Faqat PDF qabul qilinadi','error');return;}
  if(file.size>5*1024*1024){notify('❌ Max 5 MB','error');return;}
  const reader=new FileReader();
  reader.onload=()=>{
    pendingEkinoFile={name:file.name,size:file.size,dataUrl:reader.result};
    const zone=document.getElementById('ekino-zone');if(zone)zone.innerHTML=renderEkinoZone();
    notify('📄 PDF '+t('attached'),'success');
  };
  reader.onerror=()=>notify('❌ Fayl o\'qishda xatolik','error');
  reader.readAsDataURL(file);
}
function handleEkinoFile(event){processEkinoFile(event.target.files[0]);}
function ekDragOver(e){e.preventDefault();e.currentTarget.classList.add('dragover');}
function ekDragLeave(e){e.currentTarget.classList.remove('dragover');}
function ekDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  if(e.dataTransfer.files&&e.dataTransfer.files[0])processEkinoFile(e.dataTransfer.files[0]);
}
function removeEkinoFile(){
  pendingEkinoFile=null;
  const fi=document.getElementById('f-ekino');if(fi)fi.value='';
  const zone=document.getElementById('ekino-zone');if(zone)zone.innerHTML=renderEkinoZone();
}
function viewPendingEkino(){if(pendingEkinoFile)openPdfModal(pendingEkinoFile.dataUrl,pendingEkinoFile.name);}
function viewEkinoPdf(id){
  const r=reports.find(x=>x.id===id);

  openPdfModal(r.ekinoPdf.dataUrl,r.ekinoPdf.name);
}

async function callClaude(promptText){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{

${langInstr}
1. Umumiy baho (1-2 gap)
2. Muammoli ko'rsatkichlar (agar bo'lsa)
3. Tavsiyalar (2-3 ta)
4. Yakuniy xulosa: "✅ QABUL QILINADI" yoki "❌ QABUL QILINMAYDI"
Qisqa, professional.`;
  try{
    const text=await callClaude(prompt);
    lastAI=text?`<div style="white-space:pre-line;line-height:1.8">${text}</div>`:localAI(report);
    if(out)out.innerHTML=lastAI;
    notify('🤖 AI tahlil tayyor!','success');
  }catch(e){
    lastAI=localAI(report);if(out)out.innerHTML=lastAI;
    notify('⚠️ AI offline, mahalliy tahlil','warn');
  }
}

function localAI(r){
  const g=GOST[r.grade];const issues=[];
  ['oqlik','kleykovina','idk','maydalanma','tushishSoni','suvOlishi','namlik','gijirlash'].forEach(k=>{
    if(chkVal(k,r[k],r.grade)==='ng')issues.push(`❌ ${g[k].label}: ${r[k]} ${g[k].unit} (${g[k].ideal})`);
  });
  if(r.tami!=='normal')issues.push('❌ Ta\'m: normal emas');
  if(r.hidi!=='normal')issues.push('❌ Hid: normal emas');
  const ok=issues.length===0;
  return `<div style="line-height:1.8">
    <b>📊 Umumiy baho:</b> ${r.grade==='oliy'?t('highNav'):t('nav1')} — GOST asosida baholandi.<br><br>
    ${issues.length?`<b>⚠️ Muammolar:</b><br>${issues.join('<br>')}<br><br>`:'<b>✅ Barcha ko\'rsatkichlar normada</b><br><br>'}
    <span class="${ok?'verdict-ok':'verdict-ng'}">${ok?'✅ QABUL QILINADI':'❌ QABUL QILINMAYDI'}</span>
  </div>`;
}

async function askAI(){
  const q=document.getElementById('ai-q')?.value;
  const out=document.getElementById('ai-custom');
  if(!q||!out)return;
  out.innerHTML=`<div style="color:var(--text3);font-size:13px">⏳ ${t('aiRunBtn')}...</div>`;
  const langInstr=lang==='ru'?'Ответь на русском.':lang==='tr'?'Türkçe cevap ver.':'O\'zbek tilida javob ber.';
  try{
    const text=await callClaude(`Sen un zavodi laboratoriya mutaxassisisan. ${langInstr}\n\n${q}`);
    out.innerHTML=`<div class="ai-box" style="margin-top:10px"><div class="ai-head"><div class="ai-dot"></div><h3>AI</h3></div><div class="ai-body" style="white-space:pre-line">${text||'Javob olishda xatolik'}</div></div>`;
  }catch(e){
    out.innerHTML=`<div style="color:var(--red);font-size:13px">❌ AI xatolik.</div>`;
  }
}

// ── SETTINGS ──
function renderSettings(){
  if(currentRole==='laborant')return `<div class="card"><div class="cb" style="text-align:center;padding:40px;color:var(--text3)">⛔ ${t('settingsSub')}</div></div>`;
  return `
  <div class="breadcrumb">⚙️ ${t('navSettings')}</div>
  <div class="ph"><h2>${t('settingsTitle')}</h2><p>${t('settingsSub')}</p></div>
  ${currentRole==='director'?renderUserManagement():renderUserTableReadonly()}
  <div class="card" style="margin-bottom:14px">
    <div class="ch"><h3>${t('factoryInfo')}</h3></div>
    <div class="cb">
      <div class="fgrid">
        <div class="field"><label>${t('factoryName')}</label><input type="text" value="Ansar Un Zavodi"/></div>
        <div class="field"><label>${t('labCode')}</label><input type="text" value="LAB-ANSAR-001"/></div>
        <div class="field"><label>${t('techDir')}</label><input type="text" value="Texnolog Direktor"/></div>
        <div class="field"><label>${t('address')}</label><input type="text" placeholder="${t('addressPlaceholder')}"/></div>
      </div>
      <div style="margin-top:14px;text-align:right"><button class="btn btn-gold" onclick="notify('✅ Saqlandi','success')">💾 ${t('save')}</button></div>
    </div>
  </div>
  <div class="card">
    <div class="ch"><h3>${t('dataSection')}</h3></div>
    <div class="cb">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="exportCSV()">${t('exportCSV')}</button>
        <button class="btn btn-danger" onclick="clearAll()">${t('deleteAll')}</button>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--text3)">${reports.length} ${t('savedCount')}</div>
    </div>
  </div>`;
}

function roleLabel(r){return r==='director'?t('roleDirector'):r==='technologist'?t('roleTechnologist'):t('roleLaborant');}
function roleBadgeClass(r){return r==='director'?'gold':r==='technologist'?'info':'good';}

function renderUserTableReadonly(){
  const list=Object.values(users);
  return `<div class="card" style="margin-bottom:14px">
    <div class="ch"><h3>${t('users')}</h3></div>
    <div class="twrap"><table>
      <thead><tr><th>${t('fullName')}</th><th>${t('login')}</th><th>${t('role')}</th></tr></thead>
      <tbody>${list.map(u=>`<tr><td>${u.name}</td><td>${u.username}</td><td><span class="badge ${roleBadgeClass(u.role)}">${roleLabel(u.role)}</span></td></tr>`).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderUserManagement(){
  const list=Object.values(users);
  return `<div class="card" style="margin-bottom:14px">
    <div class="ch"><h3>${t('users')}</h3><button class="btn btn-gold" style="font-size:12px;padding:7px 14px" onclick="openUserForm()">➕ ${t('addUser')}</button></div>
    <div class="twrap"><table>
      <thead><tr><th>${t('fullName')}</th><th>${t('login')}</th><th>${t('role')}</th><th></th></tr></thead>
      <tbody>${list.map(u=>`
        <tr>
          <td>${u.name}</td><td>${u.username}</td>
          <td><span class="badge ${roleBadgeClass(u.role)}">${roleLabel(u.role)}</span></td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="openUserForm('${u.username}')">${t('edit')}</button>
            ${list.length>1?`<button class="btn btn-danger" style="font-size:11px;padding:5px 10px" onclick="deleteUser('${u.username}')">🗑</button>`:''}
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    <div id="user-form-wrap"></div>
  </div>`;
}

function openUserForm(username){
  const editing=username?users[username]:null;
  const wrap=document.getElementById('user-form-wrap');if(!wrap)return;
  wrap.innerHTML=`
  <div class="divider"></div>
  <div class="cb" style="padding-top:0">
    <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px">${editing?t('editUser'):t('newUser')}</div>
    <div class="fgrid">
      <div class="field"><label>${t('fullName')}</label><input type="text" id="uf-name" value="${editing?editing.name:''}" placeholder="${t('fullName')}"/></div>
      <div class="field"><label>${t('login')}</label><input type="text" id="uf-username" value="${editing?editing.username:''}" placeholder="login"/></div>
      <div class="field"><label>${t('password')}</label><input type="text" id="uf-pass" value="${editing?editing.pass:''}" placeholder="••••"/></div>
      <div class="field"><label>${t('role')}</label>
        <select id="uf-role">
          <option value="director" ${editing&&editing.role==='director'?'selected':''}>${t('roleDirector')}</option>
          <option value="technologist" ${editing&&editing.role==='technologist'?'selected':''}>${t('roleTechnologist')}</option>
          <option value="laborant" ${(!editing||editing.role==='laborant')?'selected':''}>${t('roleLaborant')}</option>
        </select>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeUserForm()">${t('cancel')}</button>
      <button class="btn btn-gold" onclick="saveUser('${editing?editing.username:''}')">💾 ${t('save')}</button>
    </div>
  </div>`;
}

function closeUserForm(){const w=document.getElementById('user-form-wrap');if(w)w.innerHTML='';}

function saveUser(origUsername){
  const name=document.getElementById('uf-name').value.trim();
  const username=document.getElementById('uf-username').value.trim().toLowerCase();
  const pass=document.getElementById('uf-pass').value;
  const role=document.getElementById('uf-role').value;
  if(!name||!username||!pass){notify('Barcha maydonlarni to\'ldiring','error');return;}
  if(username!==origUsername&&users[username]){notify('Bu login band','error');return;}
  if(origUsername&&origUsername!==username)delete users[origUsername];
  const colors={director:'#e8b84b',technologist:'#60a5fa',laborant:'#34d399'};
  users[username]={username,pass,role,name,color:colors[role]};
  saveUsers();
  if(currentUser&&origUsername===currentUser.username){
    currentUser=users[username];currentRole=currentUser.role;
    document.getElementById('uname').textContent=currentUser.name;
    document.getElementById('udot').style.background=currentUser.color;
    applyRole();
  }
  notify('✅ '+t('save'),'success');go('settings');
}

function deleteUser(username){
  if(Object.keys(users).length<=1){notify('Kamida 1 foydalanuvchi kerak','error');return;}
  if(currentUser&&currentUser.username===username){notify("O'zingizni o'chira olmaysiz",'error');return;}
  if(confirm(`"${username}" o'chirilsinmi?`)){
    delete users[username];saveUsers();notify('Foydalanuvchi o\'chirildi','warn');go('settings');
  }
}

function clearAll(){
  if(confirm('Barcha tahlil ma\'lumotlarini o\'chirasizmi?')){
    reports=[];
    fetch(SUPA_URL+'/rest/v1/reports?id=neq.null',{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    notify('Barcha ma\'lumotlar o\'chirildi','warn');go('settings');
  }
}

// ── INIT ──
// Apply saved language on load
(function(){
  T = LANGS[lang];
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.getAttribute('data-t');if(T[k])el.textContent=T[k];
  });
  document.querySelectorAll('.lang-btn').forEach(b=>{
    const txt=b.textContent.trim();
    if((lang==='uz'&&(txt==="🇺🇿 O'zbek"||txt==='UZ'))||
       (lang==='tr'&&(txt==='🇹🇷 Türkçe'||txt==='TR'))||
       (lang==='ru'&&(txt==='🇷🇺 Русский'||txt==='RU')))b.classList.add('active');
    else b.classList.remove('active');
  });
})();
</script>
